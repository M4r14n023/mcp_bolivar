<!DOCTYPE html>
<html lang="es">
<head>

  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#f0f4f8;color:#1a202c;min-height:100vh}
.app{display:flex;flex-direction:column;min-height:100vh}
.navbar{background:linear-gradient(135deg,#1a56db,#1648c0);color:#fff;padding:0 1.5rem;display:flex;align-items:center;gap:.75rem;height:58px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(26,86,219,.25)}
.nav-logo{font-size:20px;font-weight:700;letter-spacing:.5px;flex:1;display:flex;align-items:center;gap:8px}
.nav-logo span{font-size:22px}
.nav-btn{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);color:#fff;padding:6px 14px;border-radius:8px;cursor:pointer;font-size:13px;display:flex;align-items:center;gap:5px;transition:all .15s;white-space:nowrap}
.nav-btn:hover{background:rgba(255,255,255,.22)}
.nav-btn.active{background:#fff;color:#1a56db;font-weight:600}
.nav-new{background:#fff;color:#1a56db;border:none;padding:7px 16px;border-radius:9px;cursor:pointer;font-size:13px;font-weight:700;display:flex;align-items:center;gap:6px;transition:all .15s}
.nav-new:hover{background:#e8f0fe;transform:scale(1.02)}
.main{flex:1;padding:1.5rem;max-width:1200px;margin:0 auto;width:100%}
.card{background:#fff;border-radius:12px;border:.5px solid #e2e8f0;padding:1.25rem;margin-bottom:1rem}
.card-title{font-size:15px;font-weight:600;margin-bottom:1rem;color:#1a202c;display:flex;align-items:center;gap:8px}
input,select,textarea{width:100%;padding:8px 10px;border:.5px solid #cbd5e0;border-radius:8px;font-size:14px;background:#fff;color:#1a202c;transition:border-color .15s;font-family:inherit}
input:focus,select:focus,textarea:focus{outline:none;border-color:#1a56db;box-shadow:0 0 0 3px rgba(26,86,219,.08)}
label{font-size:13px;color:#4a5568;margin-bottom:4px;display:block;font-weight:500}
.btn{padding:7px 14px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:500;border:.5px solid #cbd5e0;background:#fff;color:#1a202c;transition:all .15s;display:inline-flex;align-items:center;gap:5px;white-space:nowrap}
.btn:hover{background:#f7fafc;border-color:#a0aec0}
.btn:active{transform:scale(.98)}
.btn-primary{background:#1a56db;color:#fff;border-color:#1a56db}
.btn-primary:hover{background:#1648c0;border-color:#1648c0}
.btn-danger{background:#e53e3e;color:#fff;border-color:#e53e3e}
.btn-danger:hover{background:#c53030}
.btn-success{background:#38a169;color:#fff;border-color:#38a169}
.btn-success:hover{background:#2f855a}
.btn-warning{background:#d69e2e;color:#fff;border-color:#d69e2e}
.btn-warning:hover{background:#b7791f}
.btn-info{background:#ebf8ff;color:#2b6cb0;border-color:#90cdf4}
.btn-info:hover{background:#bee3f8}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-xs{padding:3px 8px;font-size:11px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1rem}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:.75rem}
.form-group{margin-bottom:.75rem}
.badge{display:inline-flex;align-items:center;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:600;letter-spacing:.2px}
.badge-blue{background:#ebf4ff;color:#1a56db}
.badge-green{background:#f0fff4;color:#276749}
.badge-yellow{background:#fffff0;color:#744210;border:.5px solid #ecc94b}
.badge-red{background:#fff5f5;color:#c53030}
.badge-gray{background:#f7fafc;color:#4a5568;border:.5px solid #e2e8f0}
.badge-orange{background:#fffaf0;color:#c05621}
.table-wrap{overflow-x:auto;border-radius:8px;border:.5px solid #e2e8f0}
table{width:100%;border-collapse:collapse;font-size:13px}
th{padding:9px 12px;text-align:left;font-weight:600;color:#4a5568;background:#f7fafc;border-bottom:.5px solid #e2e8f0;font-size:12px;text-transform:uppercase;letter-spacing:.4px}
td{padding:9px 12px;border-bottom:.5px solid #f0f4f8;color:#1a202c;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#f8fbff}
.search-wrap{position:relative}
.search-wrap input{padding-left:38px;font-size:14px}
.search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:#a0aec0;pointer-events:none;font-size:15px}
.modal-overlay{position:fixed;inset:0;background:rgba(15,23,42,.55);z-index:200;display:flex;align-items:flex-start;justify-content:center;padding:1.5rem 1rem;overflow-y:auto;backdrop-filter:blur(2px)}
.modal{background:#fff;border-radius:14px;width:100%;max-width:720px;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal-lg{max-width:860px}
.modal-sm{max-width:440px}
.modal-header{padding:1rem 1.25rem;border-bottom:.5px solid #e2e8f0;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:#fff;z-index:1;border-radius:14px 14px 0 0}
.modal-title{font-weight:700;font-size:15px;color:#1a202c}
.modal-body{padding:1.25rem;max-height:75vh;overflow-y:auto}
.modal-footer{padding:1rem 1.25rem;border-top:.5px solid #e2e8f0;display:flex;gap:.5rem;justify-content:flex-end;flex-wrap:wrap}
.tab-bar{display:flex;gap:0;border-bottom:.5px solid #e2e8f0;margin-bottom:1.25rem}
.tab{padding:9px 18px;cursor:pointer;font-size:13px;border-bottom:2px solid transparent;color:#718096;font-weight:500;transition:all .15s}
.tab:hover{color:#1a202c}
.tab.active{color:#1a56db;border-bottom-color:#1a56db;font-weight:600}
.alert{padding:.75rem 1rem;border-radius:9px;font-size:13px;margin-bottom:.75rem;display:flex;align-items:flex-start;gap:8px}
.alert-success{background:#f0fff4;color:#276749;border:.5px solid #9ae6b4}
.alert-error{background:#fff5f5;color:#c53030;border:.5px solid #feb2b2}
.alert-info{background:#ebf8ff;color:#2b6cb0;border:.5px solid #90cdf4}
.autocomplete-wrap{position:relative}
.autocomplete-list{position:absolute;top:calc(100% + 2px);left:0;right:0;background:#fff;border:.5px solid #cbd5e0;border-radius:9px;z-index:300;max-height:160px;overflow-y:auto;box-shadow:0 8px 24px rgba(0,0,0,.12)}
.autocomplete-item{padding:9px 12px;cursor:pointer;font-size:13px;border-bottom:.5px solid #f0f4f8}
.autocomplete-item:last-child{border-bottom:none}
.autocomplete-item:hover{background:#f0f7ff;color:#1a56db}
.stat-card{background:#f7fafc;border-radius:10px;padding:.85rem 1rem;text-align:center;border:.5px solid #e2e8f0}
.stat-num{font-size:22px;font-weight:700;color:#1a56db;line-height:1.2}
.stat-label{font-size:11px;color:#718096;margin-top:3px;font-weight:500}
.section-title{font-size:12px;font-weight:700;color:#718096;margin:1rem 0 .5rem;padding-bottom:.35rem;border-bottom:.5px solid #e2e8f0;text-transform:uppercase;letter-spacing:.6px; display: flex; justify-content: space-between; align-items: center;}
.chip{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;background:#ebf4ff;color:#1a56db;border-radius:20px;font-size:12px;font-weight:500;border:.5px solid #bee3f8}
.chip-green{background:#f0fff4;color:#276749;border-color:#9ae6b4}
.empty-state{text-align:center;padding:3rem 1rem;color:#a0aec0}
.empty-icon{font-size:44px;margin-bottom:.75rem;opacity:.6}
.divider{height:.5px;background:#e2e8f0;margin:.75rem 0}
.patient-row{cursor:pointer;transition:background .1s}
.patient-row:hover td{background:#f0f7ff!important}
.finance-active{border:2px solid #1a56db!important;background:linear-gradient(135deg,#f0f7ff,#fff)!important}
.radio-group{display:flex;gap:1rem;flex-wrap:wrap}
.radio-label{display:flex;align-items:center;gap:6px;cursor:pointer;font-size:13px;color:#4a5568;font-weight:500;margin-bottom:0}
input[type=radio]{width:auto;accent-color:#1a56db}
input[type=checkbox]{width:auto;accent-color:#1a56db}
.file-drop{border:2px dashed #cbd5e0;border-radius:10px;padding:2rem;text-align:center;cursor:pointer;transition:all .2s;color:#718096;font-size:13px}
.file-drop:hover,.file-drop.over{border-color:#1a56db;background:#f0f7ff;color:#1a56db}
.file-drop-icon{font-size:32px;margin-bottom:.5rem;opacity:.7}
.progress-bar{height:6px;background:#e2e8f0;border-radius:3px;overflow:hidden;margin-top:4px}
.progress-fill{height:100%;border-radius:3px;transition:width .3s}
.spinner {border: 3px solid #f3f3f3; border-top: 3px solid #1a56db; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; margin: 0 auto;}
@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
@media(max-width:640px){.grid2,.grid3,.grid4{grid-template-columns:1fr}.nav-logo{font-size:16px}.modal-lg{max-width:100%}}
@media print {
  /* Forzamos a que el cuerpo y el contenedor principal no tengan límite de altura */
  html, body, .app, #root, .main { 
    height: auto !important;
    min-height: auto !important;
    overflow: visible !important;
    position: static !important;
    background: white !important;
  }

  /* Ocultamos todo lo que no es la lista */
  .navbar, .nav-new, .search-wrap, .card, .modal-header, .modal-footer, .no-print, button, .alert { 
    display: none !important; 
  }
  
  /* Quitamos el overlay oscuro y centramos la lista en el papel */
  .modal-overlay { 
    position: static !important; 
    background: none !important; 
    padding: 0 !important; 
    display: block !important; 
    overflow: visible !important;
  }

  .modal { 
    box-shadow: none !important; 
    border: none !important; 
    max-width: 100% !important; 
    margin: 0 !important; 
    position: static !important;
  }

  /* ELIMINAMOS EL SCROLL DE LA TABLA: Esto quita la barra que ves en tu foto */
  .modal-body { 
    overflow: visible !important; 
    max-height: none !important; 
    padding: 0 !important; 
    display: block !important;
  }

  .table-wrap, .print-area {
    overflow: visible !important;
    height: auto !important;
    display: block !important;
  }

  table { 
    width: 100% !important; 
    page-break-inside: auto; 
    border-collapse: collapse !important;
  }
  
  tr { 
    page-break-inside: avoid !important; 
    page-break-after: auto !important; 
  }
}
</style>

<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useRef, useMemo } = React;

const DB_KEY = 'mcpbolivar_v3';
const APP_VERSION = "2.1.1"; 

// ─── FUNCIONES DE BASE DE DATOS Y ESTADO ─────────────────────────────────────────
function loadDB(){try{const d=localStorage.getItem(DB_KEY);return d?JSON.parse(d):null}catch{return null}}
function saveDB(db){try{localStorage.setItem(DB_KEY,JSON.stringify(db))}catch(e){alert('Error guardando datos: espacio insuficiente')}}
function getGeminiKey() { return localStorage.getItem('mcp_gemini_key') || ''; }
function setGeminiKey(key) { localStorage.setItem('mcp_gemini_key', key); }

const DEFAULT={
  patients:[],
  cities:['Bolívar','Henderson','Pirovano','Urdampilleta'],
  streets:[],
  deviceTypes:['Desfibrilador','Marcapasos','Resincronizador'],
  brands:['Biotronik','Boston','Medtronic','Sorin','St Jude'],
  modes:[],
  finances:{sessions:[],currentSession:null}
};

function initDB(){
  const s=loadDB();
  if(!s)return{...DEFAULT};
  return{
    patients:s.patients||[],
    cities:s.cities?.length?s.cities:DEFAULT.cities,
    streets:s.streets||[],
    deviceTypes:s.deviceTypes?.length?s.deviceTypes:DEFAULT.deviceTypes,
    brands:s.brands?.length?s.brands:DEFAULT.brands,
    modes:s.modes||[],
    finances:s.finances||DEFAULT.finances
  };
}

const sortArr=arr=>[...new Set(arr)].filter(Boolean).sort((a,b)=>a.localeCompare(b,'es'));

// ─── FUNCIONES AUXILIARES Y DE CÁLCULO ─────────────────────────────────────────
function calcAge(dob){
  if(!dob||dob.length<10)return null;
  const[d,m,y]=dob.split('/');
  if(!d||!m||!y||y.length<4)return null;
  const birth=new Date(+y,+m-1,+d);
  if(isNaN(birth.getTime()))return null;
  const now=new Date();
  let age=now.getFullYear()-birth.getFullYear();
  const md=now.getMonth()-birth.getMonth();
  if(md<0||(md===0&&now.getDate()<birth.getDate()))age--;
  return age<0||age>130?null:age;
}

function formatDOB(val){
  const digits=val.replace(/\D/g,'');
  let out='';
  for(let i=0;i<digits.length&&i<8;i++){
    if(i===2||i===4)out+='/';
    out+=digits[i];
  }
  return out;
}

function todayStr(){
  const t=new Date();
  return`${String(t.getDate()).padStart(2,'0')}/${String(t.getMonth()+1).padStart(2,'0')}/${t.getFullYear()}`;
}

function batteryDisplay(p){
  if(!p)return'—';
  if(p.batteryType==='time'){
    const y=p.batteryYears??'';const m=p.batteryMonths??'';
    if(y===''&&m==='')return'—';
    return`${y!==''?y+'a ':''} ${m!==''?m+'m':''}`.trim();
  }
  return p.batteryPct!==''&&p.batteryPct!==undefined?`${p.batteryPct}%`:'—';
}

function batteryColor(p){
  if(p.batteryType==='percent'){
    const v=parseFloat(p.batteryPct);
    if(isNaN(v))return'badge-gray';
    if(v>=50)return'badge-green';
    if(v>=25)return'badge-yellow';
    return'badge-red';
  }
  return'badge-blue';
}

function lastConsulta(p){
  const cs=p.consultas||[];
  return cs.length>0?cs[cs.length-1].date:'Sin control';
}

// ─── AUTOCOMPLETE INPUT ───────────────────────────────────────────────────────
function ACInput({value,onChange,list,placeholder}){
  const[show,setShow]=useState(false);
  const[opts,setOpts]=useState([]);
  const ref=useRef(null);

  useEffect(()=>{
    const h=e=>{if(ref.current&&!ref.current.contains(e.target))setShow(false)};
    document.addEventListener('mousedown',h);
    return()=>document.removeEventListener('mousedown',h);
  },[]);

  function handleChange(e){
    const v=e.target.value;
    onChange(v);
    if(v.length>0){
      const f=list.filter(x=>x.toLowerCase().includes(v.toLowerCase())&&x.toLowerCase()!==v.toLowerCase());
      setOpts(f);setShow(f.length>0);
    }else{setShow(false)}
  }

  return(
    <div className="autocomplete-wrap" ref={ref}>
      <input value={value} onChange={handleChange}
        onFocus={()=>{if(value.length>0&&opts.length>0)setShow(true)}}
        placeholder={placeholder||''}/>
      {show&&(
        <div className="autocomplete-list">
          {opts.map(x=>(
            <div key={x} className="autocomplete-item"
              onMouseDown={e=>{e.preventDefault();onChange(x);setShow(false)}}>
              {x}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ─── BATTERY FIELDS ────────────────────────────────────────────────────────────
function BatteryFields({form,set, disabled=false}){
  return(
    <div style={{opacity: disabled ? 0.5 : 1, pointerEvents: disabled ? 'none' : 'auto'}}>
      <div className="radio-group" style={{marginBottom:'.75rem'}}>
        {['percent','time'].map(t=>(
          <label key={t} className="radio-label">
            <input type="radio" checked={form.batteryType===t} onChange={()=>set('batteryType',t)} disabled={disabled}/>
            {t==='percent'?'% Restante':'Tiempo restante'}
          </label>
        ))}
      </div>
      {form.batteryType==='percent'?(
        <div style={{maxWidth:180}}>
          <label>Porcentaje (%)</label>
          <input type="number" min="0" max="100" value={form.batteryPct}
            onChange={e=>set('batteryPct',e.target.value)} placeholder="85" disabled={disabled}/>
          {form.batteryPct!==''&&(
            <div className="progress-bar" style={{marginTop:6}}>
              <div className="progress-fill" style={{
                width:`${Math.min(100,parseFloat(form.batteryPct)||0)}%`,
                background:parseFloat(form.batteryPct)>=50?'#38a169':parseFloat(form.batteryPct)>=25?'#d69e2e':'#e53e3e'
              }}/>
            </div>
          )}
        </div>
      ):(
        <div className="grid2" style={{maxWidth:280}}>
          <div><label>Años</label>
            <input type="number" min="0" value={form.batteryYears} onChange={e=>set('batteryYears',e.target.value)} placeholder="0" disabled={disabled}/>
          </div>
          <div><label>Meses</label>
            <input type="number" min="0" max="11" value={form.batteryMonths} onChange={e=>set('batteryMonths',e.target.value)} placeholder="6" disabled={disabled}/>
          </div>
        </div>
      )}
    </div>
  );
}

function PatientForm({db,setDB,patient,onClose}){
  const isEdit=!!patient;
  const[form,setForm]=useState(()=>patient?{...patient}:{
    id:Date.now().toString(),
    apellido:'',nombre:'',dob:'',
    telPrefix:'2314',telNum:'',telOwner:'Paciente',telContact:'',
    city:'Bolívar',street:'',streetNum:'',
    deviceType:'Marcapasos',brand:'',mode:'',
    batteryType:'percent',batteryPct:'',batteryYears:'',batteryMonths:'',
    obs:'',consultas:[],createdAt:new Date().toISOString()
  });
  const[err,setErr]=useState('');
  const age=useMemo(()=>calcAge(form.dob),[form.dob]);
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));

  function save(){
    if(!form.apellido.trim()||!form.nombre.trim()){setErr('Apellido y nombre son requeridos');return}
    const dup=db.patients.find(p=>
      p.id!==form.id&&
      p.apellido.trim().toLowerCase()===form.apellido.trim().toLowerCase()&&
      p.nombre.trim().toLowerCase()===form.nombre.trim().toLowerCase()
    );
    if(dup){setErr(`Ya existe un paciente: ${dup.apellido}, ${dup.nombre}`);return}

    let newDB={...db};
    const st=form.street?.trim();
    const mo=form.mode?.trim();
    if(st&&!newDB.streets.includes(st))newDB.streets=sortArr([...newDB.streets,st]);
    if(mo&&!newDB.modes.includes(mo))newDB.modes=sortArr([...newDB.modes,mo]);

    const saved={...form,apellido:form.apellido.trim(),nombre:form.nombre.trim()};
    newDB.patients=isEdit
      ?newDB.patients.map(p=>p.id===saved.id?saved:p)
      :[...newDB.patients,saved];
    setDB(newDB);
    // IMPORTANTE: Aquí pasamos el ID para que App sepa a quién abrirle la consulta
    onClose(saved.id);
  }

  return(
    <div className="modal-overlay">
      <div className="modal modal-lg">
        <div className="modal-header">
          <span className="modal-title">{isEdit?`Editar — ${form.apellido}, ${form.nombre}`:'Nuevo Paciente'}</span>
          <button className="btn btn-sm" onClick={() => onClose()}>✕</button>
        </div>
        <div className="modal-body">
          {err&&<div className="alert alert-error">⚠ {err}</div>}
          <div className="section-title">Datos Personales</div>
          <div className="grid2">
            <div className="form-group">
              <label>Apellido *</label>
              <input value={form.apellido} onChange={e=>set('apellido',e.target.value)} placeholder="García"/>
            </div>
            <div className="form-group">
              <label>Nombre *</label>
              <input value={form.nombre} onChange={e=>set('nombre',e.target.value)} placeholder="Juan Carlos"/>
            </div>
          </div>
          <div style={{maxWidth:240}} className="form-group">
            <label>Fecha de Nacimiento</label>
            <input value={form.dob}
              onChange={e=>set('dob',formatDOB(e.target.value))}
              placeholder="DD/MM/AAAA" maxLength={10}/>
            {age!==null&&(
              <div style={{fontSize:12,color:'#38a169',marginTop:4,fontWeight:600}}>✓ Edad: {age} años</div>
            )}
          </div>

          <div className="section-title">Contacto</div>
          <div className="grid3">
            <div className="form-group">
              <label>Prefijo</label>
              <input value={form.telPrefix} onChange={e=>set('telPrefix',e.target.value)} placeholder="2314"/>
            </div>
            <div className="form-group">
              <label>Número</label>
              <input value={form.telNum} onChange={e=>set('telNum',e.target.value)} placeholder="421234"/>
            </div>
            <div className="form-group">
              <label>Pertenece a</label>
              <select value={form.telOwner} onChange={e=>set('telOwner',e.target.value)}>
                <option>Paciente</option>
                <option>Hijos</option>
                <option>Otros</option>
              </select>
            </div>
          </div>
          {(form.telOwner==='Hijos'||form.telOwner==='Otros')&&(
            <div className="form-group">
              <label>Nombre del contacto</label>
              <input value={form.telContact} onChange={e=>set('telContact',e.target.value)} placeholder="Nombre del familiar"/>
            </div>
          )}

          <div className="section-title">Dirección</div>
          <div className="grid3">
            <div className="form-group">

// ─── CONSULTA FORM (LÓGICA CORREGIDA) ───────────────────────────────────────────
function ConsultaForm({patient,db,setDB,onClose}){
  const[form,setForm]=useState({
    id:Date.now().toString(),
    date:todayStr(),
    brand:patient.brand||'',
    batteryType:patient.batteryType||'percent',
    batteryPct:patient.batteryPct||'',
    batteryYears:patient.batteryYears||'',
    batteryMonths:patient.batteryMonths||'',
    obs:'sin particularidades',
    particular:false
  });
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));

  function save(){
    const newC = { ...form };
    // Actualizamos la ficha del paciente con los datos de esta consulta
    const updP = {
      ...patient,
      consultas: [...(patient.consultas || []), newC],
      brand: form.brand,
      batteryType: form.batteryType,
      batteryPct: form.batteryPct,
      batteryYears: form.batteryYears,
      batteryMonths: form.batteryMonths
    };

    let newDB = { ...db, patients: db.patients.map(p => p.id === patient.id ? updP : p) };
    
    // Si no es consulta particular, sumamos al contador de la jornada actual
    if (!form.particular && newDB.finances?.currentSession) {
      newDB.finances = {
        ...newDB.finances,
        currentSession: {
          ...newDB.finances.currentSession,
          count: (newDB.finances.currentSession.count || 0) + 1
        }
      };
    }
    
    setDB(newDB);
    onClose();
  }

  return(
    <div className="modal-overlay" style={{zIndex:300}}>
      <div className="modal modal-sm">
        <div className="modal-header">
          <span className="modal-title">Nueva Consulta</span>
          <button className="btn btn-sm" onClick={onClose}>✕</button>
        </div>
        <div className="modal-body">
          <p style={{fontSize:13,color:'#718096',marginBottom:'1rem'}}>
            Paciente: <strong style={{color:'#1a202c'}}>{patient.apellido}, {patient.nombre}</strong>
          </p>
          <div className="grid2">
            <div className="form-group"><label>Fecha</label>
              <input value={form.date} onChange={e=>set('date',e.target.value)}/>
            </div>
            <div className="form-group"><label>Marca</label>
              <select value={form.brand} onChange={e=>set('brand',e.target.value)}>
                <option value="">—</option>
                {db.brands.map(b=><option key={b}>{b}</option>)}
              </select>
            </div>
          </div>
          <div className="section-title">Batería en esta consulta</div>
          <BatteryFields form={form} set={set}/>
          <div className="form-group" style={{marginTop:'.75rem'}}>
            <label>Observaciones</label>
            <textarea rows={3} value={form.obs} onChange={e=>set('obs',e.target.value)}/>
          </div>
          <label className="radio-label" style={{marginTop:'.5rem'}}>
            <input type="checkbox" checked={form.particular} onChange={e=>set('particular',e.target.checked)}/>
            <span>Consulta Particular <span style={{color:'#718096',fontWeight:400}}>(no impacta en finanzas)</span></span>
          </label>
        </div>
        <div className="modal-footer">
          <button className="btn" onClick={onClose}>Cancelar</button>
          <button className="btn btn-primary" onClick={save}>💾 Guardar Consulta</button>
        </div>
      </div>
    </div>
  );
}

// ─── AI REPORT GENERATOR (ACTUALIZADO: MULTIPLES PDF + NOMBRE FORMATEADO) ─────
function AIReportGenerator({patient, onClose}) {
  const [step, setStep] = useState(1); // 1: Upload, 2: Form, 3: Success
  const [status, setStatus] = useState('');
  const [dragging, setDragging] = useState(false);
  
  // CAMBIO 1: Estado para el visor del PDF ahora maneja MÚLTIPLES archivos
  const [pdfFiles, setPdfFiles] = useState([]);
  const [pdfUrl, setPdfUrl] = useState(null);
  const [showViewer, setShowViewer] = useState(false);
  
  // Formulario del Informe Clínico
  const [form, setForm] = useState({
    modo: patient.mode || '', // Extraer Modo
    impA: '', impV: '', impShock: '',
    batteryType: patient.batteryType || 'percent',
    batteryPct: patient.batteryPct || '',
    batteryYears: patient.batteryYears || '',
    batteryMonths: patient.batteryMonths || '',
    isERI: false, isEOL: false,
    estimV: '',
    arrPMT: false, arrModo: false, arrRuido: false, arrOtros: '',
    conclusion: '',
    nextControl: ''
  });

  const set = (k, v) => setForm(f => ({ ...f, [k]: v }));
  const apiKey = getGeminiKey();

  // Gestión de memoria para el PDF Url (Muestra el primero de la lista)
  useEffect(() => {
    if (pdfFiles.length > 0) {
      const url = URL.createObjectURL(pdfFiles[0]);
      setPdfUrl(url);
      return () => URL.revokeObjectURL(url);
    }
  }, [pdfFiles]);

  // Lógica inteligente de conclusión clínica
  useEffect(() => {
    if (step !== 2) return; 
    
    let conc = "Parámetros de funcionamiento dentro de límites normales.";
    let ctrl = "6 a 8 meses";

    if (form.isEOL) { 
      conc = "Dispositivo en Indicación de Recambio Inmediato."; 
      ctrl = "Programar recambio"; 
    }
    else if (form.isERI) { 
      conc = "Dispositivo con Indicación de Recambio alcanzada."; 
      ctrl = "Programar recambio"; 
    }
    else {
      const arrs = [];
      if(form.arrPMT) arrs.push("PMT"); 
      if(form.arrModo) arrs.push("Cambios de Modo"); 
      if(form.arrRuido) arrs.push("Ruido Auricular"); 
      if(form.arrOtros) arrs.push(form.arrOtros);
      
      if (arrs.length > 0) conc += ` Se detectaron episodios de: ${arrs.join(', ')}.`;
      
      let isLow = false;
      if (form.batteryType === 'percent' && parseFloat(form.batteryPct) < 30) isLow = true;
      if (form.batteryType === 'time' && (parseInt(form.batteryYears)||0) < 1) isLow = true;
      if (isLow) ctrl = "3 meses";
    }
    
    set('conclusion', conc);
    set('nextControl', ctrl);
  }, [form.isERI, form.isEOL, form.arrPMT, form.arrModo, form.arrRuido, form.arrOtros, form.batteryType, form.batteryPct, form.batteryYears, form.batteryMonths, step]);

 // ─── MANEJADOR DE SUBIDA (CORREGIDO: MODELO Y EXTRACCIÓN DE JSON) ─────────────
  async function handleFileUpload(files) {
    const arr = Array.from(files).filter(f => f.type === 'application/pdf');
    if(arr.length === 0) return;
    
    // Guardamos todos los archivos, pero usamos el primero para la IA
    const mainFile = arr[0];
    setPdfFiles(prev => [...prev, ...arr]);
    
    if(!apiKey) {
      if(window.confirm('No tienes configurada la API Key de Gemini. ¿Quieres llenar el formulario manualmente?')) {
        setStep(2);
      }
      return;
    }

    setStatus('leyendo');
    try {
      const arrayBuffer = await mainFile.arrayBuffer();
      const pdf = await pdfjsLib.getDocument(arrayBuffer).promise;
      let fullText = '';
      for (let i = 1; i <= pdf.numPages; i++) {
          const page = await pdf.getPage(i);
          const textContent = await page.getTextContent();
          fullText += textContent.items.map(item => item.str).join(' ') + ' \n';
      }

      setStatus('ia');
      const prompt = `Actúa como un técnico experto en marcapasos. Analiza TODO este texto extraído de un informe de dispositivo cardíaco (puede ser Biotronik, Medtronic, Abbott, etc.). 
      IMPORTANTE: La información suele estar muy dispersa. Revisa desde la primera hasta la última línea.
      - En informes Biotronik, los números de impedancia suelen estar varias líneas por debajo del texto "Imped. electrodos [Ω]". 
      - El modo (ej. DDDR, VVI) puede aparecer en cualquier página, búscalo cuidadosamente.
      
      Devuelve ÚNICAMENTE un objeto JSON válido con esta estructura exacta:
      {
        "modo": "modo de estimulación (ej. DDD, VVI, DDDR, etc) o vacío",
        "impA": "valor numérico en Ohms o vacío",
        "impV": "valor numérico en Ohms o vacío",
        "impShock": "valor numérico en Ohms o vacío",
        "estimV": "valor de porcentaje de estimulación ventricular o vacío",
        "eri": true o false,
        "eol": true o false
      }
      
      Texto completo a analizar:
      ${fullText}`;

      // ¡CORRECCIÓN CRÍTICA!: URL apuntando al modelo gemini-1.5-flash válido
      const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
      });

      if (!response.ok) {
         throw new Error(`Error de conexión con IA: ${response.status}`);
      }

      const data = await response.json();
      if(!data.candidates) throw new Error("Error en la respuesta de la IA.");
      
      let jsonText = data.candidates[0].content.parts[0].text;
      
      // PARCHE DE EXTRACCIÓN: Filtramos matemáticamente solo las llaves {}
      const jsonMatch = jsonText.match(/\{[\s\S]*\}/);
      if (jsonMatch) {
          jsonText = jsonMatch[0];
      }
      
      const result = JSON.parse(jsonText);

      setForm(prev => ({
        ...prev,
        modo: result.modo || prev.modo || '', 
        impA: result.impA || '', impV: result.impV || '', impShock: result.impShock || '',
        estimV: result.estimV || '',
        isERI: result.eri || false, isEOL: result.eol || false
      }));

      setStep(2); 
    } catch(err) {
      console.error(err);
      setStatus('Error procesando el PDF. Puedes completar los datos manualmente.');
      setTimeout(() => setStep(2), 2000);
    }
  }

  // Generador del PDF final
  async function generateFinalPDF() {
    try {
      setStatus('generando');
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF({ unit: 'mm', format: 'a4' });

      // Membrete Superior
      doc.setFillColor(26, 86, 219); doc.rect(0, 0, 210, 30, 'F');
      doc.setTextColor(255, 255, 255); doc.setFontSize(20); doc.setFont('helvetica', 'bold');
      doc.text('Informe de Control de Dispositivo', 14, 18);
      doc.setFontSize(10); doc.setFont('helvetica', 'normal');
      doc.text(`Sede: Bolívar — Fecha: ${todayStr()}`, 14, 25);

      // Datos del Paciente
      doc.setTextColor(26, 32, 44); doc.setFontSize(14); doc.setFont('helvetica', 'bold');
      doc.text(`Paciente: ${patient.apellido}, ${patient.nombre}`, 14, 45);
      doc.setFontSize(11); doc.setFont('helvetica', 'normal');
      doc.text(`Dispositivo: ${patient.deviceType} ${patient.brand} (${form.modo || 'N/A'})`, 14, 52);
      
      const age = calcAge(patient.dob);
      if(age) doc.text(`Edad: ${age} años`, 14, 58);

      doc.setDrawColor(226, 232, 240); doc.setLineWidth(0.5); doc.line(14, 65, 196, 65);

      // Parámetros Eléctricos
      let y = 75;
      doc.setFontSize(12); doc.setFont('helvetica', 'bold'); doc.text('Parámetros Eléctricos y Estado:', 14, y); y+=8;
      
      doc.setFontSize(10); doc.setFont('helvetica', 'normal');
      doc.text(`Impedancia Auricular:`, 14, y); doc.setFont('helvetica', 'bold'); doc.text(`${form.impA ? form.impA + ' Ω' : '—'}`, 60, y);
      doc.setFont('helvetica', 'normal');
      doc.text(`Impedancia Ventricular:`, 105, y); doc.setFont('helvetica', 'bold'); doc.text(`${form.impV ? form.impV + ' Ω' : '—'}`, 155, y); y+=8;
      
      if(patient.deviceType === 'Desfibrilador' || patient.deviceType === 'Resincronizador') {
        doc.setFont('helvetica', 'normal'); doc.text(`Impedancia Choque:`, 14, y); doc.setFont('helvetica', 'bold'); doc.text(`${form.impShock ? form.impShock + ' Ω' : '—'}`, 60, y); y+=8;
      }
      
      doc.setFont('helvetica', 'normal'); doc.text(`Estimulación Ventricular:`, 14, y); doc.setFont('helvetica', 'bold'); doc.text(`${form.estimV ? form.estimV + '%' : '—'}`, 60, y); y+=10;
      
      let batTxt = batteryDisplay({...patient, batteryType: form.batteryType, batteryPct: form.batteryPct, batteryYears: form.batteryYears, batteryMonths: form.batteryMonths});
      if(form.isEOL) batTxt = "EOL (Fin de Vida / Recambio Inmediato)"; else if(form.isERI) batTxt = "ERI (Indicación de Recambio)";
      
      doc.setFillColor(247, 250, 252); doc.rect(14, y-5, 182, 10, 'F');
      doc.setFont('helvetica', 'bold'); doc.setTextColor(26, 86, 219);
      doc.text(`Estado de Batería: ${batTxt}`, 16, y+1); y+=15;

      doc.setTextColor(26, 32, 44);
      doc.setFillColor(240, 247, 255); doc.rect(14, y-5, 182, 35, 'F');
      doc.setFont('helvetica', 'bold'); doc.text('Conclusión Clínica:', 16, y); y+=7;
      doc.setFont('helvetica', 'normal');
      const splitConc = doc.splitTextToSize(form.conclusion, 175);
      doc.text(splitConc, 16, y); y+=25;

      doc.setFont('helvetica', 'bold'); doc.text(`Próximo Control Sugerido: ${form.nextControl}`, 14, y); y+=15;

      doc.setFontSize(9); doc.setFont('helvetica', 'italic'); doc.setTextColor(113, 128, 150);
      doc.text('Los valores de impedancia y sensibilidad se consideran normales según las', 14, y);
      doc.text('especificaciones técnicas del fabricante del dispositivo.', 14, y+5);

      const coverBuf = doc.output('arraybuffer');
      const { PDFDocument } = window.PDFLib;
      const mergedDoc = await PDFDocument.create();
      const coverDoc = await PDFDocument.load(coverBuf);
      const coverPages = await mergedDoc.copyPages(coverDoc, [0]);
      mergedDoc.addPage(coverPages[0]);

      // CAMBIO 3: Fusión de TODOS los PDFs subidos
      for (const file of pdfFiles) {
        const fileBuf = await file.arrayBuffer();
        const extDoc = await PDFDocument.load(fileBuf);
        const pages = await mergedDoc.copyPages(extDoc, extDoc.getPageIndices());
        pages.forEach(p => mergedDoc.addPage(p));
      }

      const mergedBytes = await mergedDoc.save();
      const blob = new Blob([mergedBytes], { type: 'application/pdf' });
      const url = URL.createObjectURL(blob);
      
      // CAMBIO 4: NOMBRE DEL ARCHIVO "Apellido Nombre - Mes Año"
      const monthNames = ["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"];
      const now = new Date();
      const finalFileName = `${patient.apellido} ${patient.nombre} - ${monthNames[now.getMonth()]} ${now.getFullYear()}.pdf`;

      const a = document.createElement('a');
      a.href = url; a.download = finalFileName; a.click();

      setStatus('¡Informe generado con éxito!');
      setTimeout(onClose, 2000);
    } catch(err) {
      console.error(err);
      setStatus('Error al generar el PDF final. Revisa la consola.');
    }
  }

  return (
    <div className="modal-overlay" style={{zIndex:300}}>
      <div className="modal modal-lg">
        <div className="modal-header">
          <span className="modal-title">📄 Generador Inteligente de Informes</span>
          <button className="btn btn-sm" onClick={onClose}>✕</button>
        </div>
        <div className="modal-body">
          <div style={{background:'#ebf8ff', padding:'10px 15px', borderRadius:8, marginBottom:15, fontSize:13}}>
            <strong>Paciente:</strong> {patient.apellido}, {patient.nombre} | <strong>Dispositivo:</strong> {patient.deviceType} {patient.brand}
          </div>

          {step === 1 && (
            <div style={{textAlign:'center', padding:'2rem'}}>
              {/* CAMBIO 5: Agregamos "multiple" al input y allow drop múltiple */}
              <div className={`file-drop${dragging?' over':''}`}
                onClick={()=>document.getElementById('pdf-upload').click()}
                onDragOver={e=>{e.preventDefault();setDragging(true)}} onDragLeave={()=>setDragging(false)}
                onDrop={e=>{e.preventDefault();setDragging(false);handleFileUpload(e.dataTransfer.files)}}
              >
                <div className="file-drop-icon">📑</div>
                {status === 'leyendo' ? <><div className="spinner"></div><p style={{marginTop:10}}>Extrayendo texto del PDF...</p></> :
                 status === 'ia' ? <><div className="spinner"></div><p style={{marginTop:10}}>Gemini está analizando los parámetros...</p></> :
                 <><p style={{fontWeight:600}}>Carga Automática con IA</p><p style={{fontSize:12, color:'#718096', marginTop:4}}>Arrastrá UNO o VARIOS PDFs aquí</p></>}
              </div>
              <input id="pdf-upload" type="file" accept=".pdf" multiple style={{display:'none'}} onChange={e=>handleFileUpload(e.target.files)}/>
              
              <div className="divider">o</div>
              <button className="btn" onClick={()=>setStep(2)}>📝 Carga Manual (Sin PDF)</button>
              {status && status.startsWith('Error') && <div className="alert alert-error" style={{marginTop:15}}>⚠ {status}</div>}
            </div>
          )}

          {step === 2 && (
            <div>
              <div className="section-title">
                1. Revisión de Parámetros Extraídos
                <div style={{display:'flex', gap:8}}>
                  {/* CAMBIO 6: Botón para sumar MÁS pdfs desde la segunda pantalla */}
                  {pdfFiles.length > 0 && (
                    <button className="btn btn-xs btn-info" onClick={() => setShowViewer(!showViewer)}>
                      {showViewer ? '🙈 Ocultar PDF' : '👁️ Ver PDF Original'}
                    </button>
                  )}
                  <label className="btn btn-xs" style={{cursor:'pointer', margin:0, display:'inline-flex', alignItems:'center'}}>
                    ➕ Adjuntar otro PDF 
                    <input type="file" accept=".pdf" multiple style={{display:'none'}} onChange={e=>setPdfFiles(prev => [...prev, ...Array.from(e.target.files)])}/>
                  </label>
                </div>
              </div>

              {/* Visor de PDF incorporado */}
              {showViewer && pdfUrl && (
                <div style={{marginBottom: '1rem', border: '1px solid #cbd5e0', borderRadius: '8px', overflow: 'hidden'}}>
                  <iframe src={pdfUrl} width="100%" height="400px" style={{border: 'none', display: 'block'}}></iframe>
                  <div style={{padding:'5px 10px', background:'#f1f5f9', fontSize:11, display:'flex', gap:10, overflowX:'auto'}}>
                    <strong>Archivos a unir:</strong> {pdfFiles.map((f, i) => <span key={i} className="badge badge-gray">{f.name}</span>)}
                  </div>
                </div>
              )}

              <div className="grid4">
                <div className="form-group"><label>Modo</label><input value={form.modo} onChange={e=>set('modo',e.target.value)} placeholder="DDD, VVI..."/></div>
                <div className="form-group"><label>Impedancia A (Ω)</label><input value={form.impA} onChange={e=>set('impA',e.target.value)} placeholder="Ej: 450"/></div>
                <div className="form-group"><label>Impedancia V (Ω)</label><input value={form.impV} onChange={e=>set('impV',e.target.value)} placeholder="Ej: 600"/></div>
                <div className="form-group"><label>Estimulación V (%)</label><input value={form.estimV} onChange={e=>set('estimV',e.target.value)} placeholder="Ej: 99"/></div>
              </div>
              {(patient.deviceType==='Desfibrilador'||patient.deviceType==='Resincronizador') && (
                <div className="form-group" style={{maxWidth:200}}><label>Impedancia Choque (Ω)</label><input value={form.impShock} onChange={e=>set('impShock',e.target.value)}/></div>
              )}

              <div className="section-title">2. Batería y Estado del Dispositivo</div>
              <div style={{display:'flex', gap:20, alignItems:'center', background:'#f7fafc', padding:15, borderRadius:8, marginBottom:15, border:'0.5px solid #e2e8f0'}}>
                <div style={{borderRight:'1px solid #cbd5e0', paddingRight:20}}>
                  <label className="radio-label"><input type="checkbox" checked={form.isERI} onChange={e=>set('isERI',e.target.checked)}/> Ind. Recambio (ERI)</label>
                  <label className="radio-label" style={{marginTop:5}}><input type="checkbox" checked={form.isEOL} onChange={e=>set('isEOL',e.target.checked)}/> Fin de Vida (EOL)</label>
                </div>
                <div style={{flex:1}}><BatteryFields form={form} set={set} disabled={form.isERI || form.isEOL}/></div>
              </div>

              <div className="section-title">3. Arritmias Detectadas</div>
              <div style={{display:'flex', gap:15, flexWrap:'wrap', marginBottom:15}}>
                <label className="radio-label"><input type="checkbox" checked={form.arrPMT} onChange={e=>set('arrPMT',e.target.checked)}/> PMT</label>
                <label className="radio-label"><input type="checkbox" checked={form.arrModo} onChange={e=>set('arrModo',e.target.checked)}/> Cambios de Modo</label>
                <label className="radio-label"><input type="checkbox" checked={form.arrRuido} onChange={e=>set('arrRuido',e.target.checked)}/> Ruido Auricular</label>
                <input style={{width:'auto', flex:1}} value={form.arrOtros} onChange={e=>set('arrOtros',e.target.value)} placeholder="Otras (ej. TA/FA)..."/>
              </div>

              <div className="section-title">4. Conclusión Automática y Próximo Control</div>
              <div className="form-group">
                <textarea rows={2} value={form.conclusion} onChange={e=>set('conclusion',e.target.value)} style={{fontWeight:500}}/>
              </div>
              <div className="form-group" style={{maxWidth:300}}>
                <label>Próximo Control en</label>
                <input value={form.nextControl} onChange={e=>set('nextControl',e.target.value)}/>
              </div>

              {status === 'generando' && <div className="alert alert-info">⏳ Generando informe y fusionando {pdfFiles.length} PDF(s)...</div>}
              {status === '¡Informe generado con éxito!' && <div className="alert alert-success">✓ {status}</div>}
            </div>
          )}
        </div>
        <div className="modal-footer">
          {step === 2 && <button className="btn" onClick={()=>setStep(1)}>Volver</button>}
          <button className="btn" onClick={onClose}>Cancelar</button>
          {step === 2 && <button className="btn btn-primary" onClick={generateFinalPDF}>🖨 Guardar e Imprimir PDF</button>}
        </div>
      </div>
    </div>
  );
}
